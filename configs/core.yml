# Core (global, project-agnostic) defaults. The repo is the installed tool; project paths live
# in each external project folder, not here. Env-overridable via BEHAVIARIUM_* (e.g.
# BEHAVIARIUM_RECORDING_DURATION_S).

# Single source of truth for fps: corrected_fps = actual_frame_count / recording_duration_s.
recording_duration_s: 600

video_extensions: [".mp4", ".avi", ".mov", ".mkv"]
