# Project TEMPLATE: three-chamber social interaction test (Phase 7 model).
# `behaviarium init-project <dir> --data <path> --template pt_social` copies this into
# <dir>/project.yml and records the chosen data_path. Study-specifics (design matrix, regions,
# cluster count) live here — core knows no assay.

name: pt_social
assay: "3C_SIT"
data_path: "data"          # placeholder; init-project overwrites with the real --data path

n_clusters: 14

# Design matrix: factors x levels. Cells = product of level counts (4 x 2 = 8).
# Videos are tagged into a cell in the UI; the tag becomes the factor columns downstream.
design:
  factors:
    - {name: treatment, levels: ["Sal-N", "Sal-Hx", "LPS-N", "DH"]}
    - {name: housing,   levels: ["PT", "EE"]}

# OpenCV preprocessing. Three-chamber arena = rectangular ROI.
rotate:
  degrees: 0
  flip: null
boundary:
  shape: rect
  threshold: 127
  blur_ksize: 5
  min_area_frac: 0.02
  max_area_frac: 0.98
  sample_frame: 0
mask:
  crop: true
  fill_value: 0

# DLC pose estimation. PRODUCTION engine = tensorflow (on Windows).
dlc:
  engine: tensorflow
  model_config_path: "C:/dlc/double_hit_social-Javid-2022-03-21/config.yaml"
  shuffle: 1
  trainingsetindex: 0
  bodyparts: ["snout", "leftear", "rightear", "shoulder", "spine1", "spine2", "tailbase"]
  filter:
    enabled: false
    type: median
    windowlength: 5
    delegate_to_dlc: false

# Chamber occupancy: the 6-quadrant rule expressed as DATA (fractions of the ROI bbox).
chamber:
  tracking_bodypart: spine1
  regions:
    - {name: left_near,   shape: rect, x: 0.0,    y: 0.0, w: 0.3333, h: 0.5}
    - {name: left_far,    shape: rect, x: 0.0,    y: 0.5, w: 0.3333, h: 0.5}
    - {name: center_near, shape: rect, x: 0.3333, y: 0.0, w: 0.3334, h: 0.5}
    - {name: center_far,  shape: rect, x: 0.3333, y: 0.5, w: 0.3334, h: 0.5}
    - {name: right_near,  shape: rect, x: 0.6667, y: 0.0, w: 0.3333, h: 0.5}
    - {name: right_far,   shape: rect, x: 0.6667, y: 0.5, w: 0.3333, h: 0.5}

# B-SOiD behavioral clustering. PRODUCTION engine = real (on Windows).
bsoid:
  engine: real
  n_clusters: 14
  module: "bsoid_py.classify"
  model_path: "C:/bsoid/models/double_hit_social_bsoid.sav"

# Real significance. Compare by a design factor (housing: PT vs EE).
stats:
  group_factor: housing
  metric: fraction
  n_permutations: 1000
  alpha: 0.05
  seed: 0
