# Project TEMPLATE: open-field test (Phase 7 model). A trivial one-factor design proves the
# design matrix + tagging are fully generic in factor count. Same core, different assay.

name: oft_demo
assay: "OFT"
data_path: "data"          # placeholder; init-project overwrites with the real --data path

n_clusters: 6

# Trivial design: a single 2-level factor.
design:
  factors:
    - {name: group, levels: ["A", "B"]}

# OpenCV preprocessing. Open field = circular ROI; differs from 3C_SIT purely via config.
rotate:
  degrees: 90
  flip: horizontal
boundary:
  shape: circle
  threshold: 127
  blur_ksize: 5
  min_area_frac: 0.02
  max_area_frac: 0.98
  sample_frame: 0
mask:
  crop: false
  fill_value: 0

# DLC pose estimation. STUB engine — first-class, no heavy deps.
dlc:
  engine: stub
  shuffle: 1
  trainingsetindex: 0
  bodyparts: ["nose", "center", "tailbase"]
  filter:
    enabled: true
    type: median
    windowlength: 5
    delegate_to_dlc: false

# Chamber occupancy: center vs periphery (inner-square fraction).
chamber:
  tracking_bodypart: center
  regions:
    - {name: center,    shape: rect, x: 0.25, y: 0.25, w: 0.5, h: 0.5}
    - {name: periphery, shape: rect, x: 0.0,  y: 0.0,  w: 1.0, h: 1.0}

# B-SOiD behavioral clustering. STUB engine.
bsoid:
  engine: stub
  n_clusters: 6

# Real significance. Compare by the design factor (group: A vs B).
stats:
  group_factor: group
  metric: fraction
  n_permutations: 500
  alpha: 0.05
  seed: 0
